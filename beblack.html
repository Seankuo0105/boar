<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑化圖片😈</title>
    <link rel="icon" href="https://seankuo0105.github.io/boar/pig.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }
        h1 {
            color: #ff4d4d;
            margin-bottom: 20px;
        }
        .control-group {
            margin: 20px 0;
            text-align: left;
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }
        input[type="file"] {
            display: block;
            margin-top: 10px;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }
        button {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #ff1a1a;
            transform: scale(1.02);
        }
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>黑化圖片 😈</h1>
        
        <div class="control-group">
            <label for="imageInput">🐗 選擇要黑化的圖片 (可多選)：</label>
            <input type="file" id="imageInput" accept="image/*" multiple>
        </div>

        <div class="control-group">
            <label for="threshold">🐗 偏白判定閾值: <span id="thresholdVal">200</span></label>
            <br>
            <small style="color:#aaa;">(數值越高，越純白的才會保留；數值越低，連淺灰色也會被保留)</small>
            <input type="range" id="threshold" min="0" max="255" value="200">
        </div>

        <button id="processBtn">黑化並下載 ZIP 😈</button>
        <div id="status">等待上傳圖片中... 🐗</div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdVal = document.getElementById('thresholdVal');
        const processBtn = document.getElementById('processBtn');
        const statusDiv = document.getElementById('status');

        // 更新滑桿數值顯示
        thresholdSlider.addEventListener('input', () => {
            thresholdVal.textContent = thresholdSlider.value;
        });

        processBtn.addEventListener('click', async () => {
            const files = imageInput.files;
            if (files.length === 0) {
                alert('哼哼！你還沒有選擇任何圖片啊！🐗');
                return;
            }

            processBtn.disabled = true;
            statusDiv.textContent = '🐗 正在施展黑化魔法...';
            
            const zip = new JSZip();
            const threshold = parseInt(thresholdSlider.value, 10);

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusDiv.textContent = `🐗 處理中: ${i + 1} / ${files.length} (${file.name})`;
                
                try {
                    const blob = await processImage(file, threshold);
                    // 將處理好的圖片放入 zip，保持原本的副檔名
                    zip.file(`darkened_${file.name}`, blob);
                } catch (err) {
                    console.error('處理圖片失敗:', err);
                }
            }

            statusDiv.textContent = '🐗 正在打包 ZIP，請稍候...';
            
            // 產生 ZIP 檔案並下載
            zip.generateAsync({ type: 'blob' }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = '黑化圖片.zip';
                link.click();
                
                statusDiv.textContent = '✨ 打包完成！已經開始下載啦！🐗💨';
                processBtn.disabled = false;
            });
        });

        // 處理單張圖片的核心邏輯
        function processImage(file, threshold) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const url = URL.createObjectURL(file);
                
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // 畫上原圖
                    ctx.drawImage(img, 0, 0);
                    
                    // 獲取像素數據
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    
                    // 遍歷每個像素 (RGBA)
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        const a = data[i + 3];

                        // 如果是完全透明的像素，就跳過
                        if (a === 0) continue;

                        // 判斷是否為「偏白色」 (R, G, B 都大於或等於閾值)
                        if (!(r >= threshold && g >= threshold && b >= threshold)) {
                            // 不是偏白色的地方，全部塗黑！😈
                            data[i] = 0;     // R
                            data[i + 1] = 0; // G
                            data[i + 2] = 0; // B
                        }
                    }
                    
                    // 將修改後的數據放回 canvas
                    ctx.putImageData(imageData, 0, 0);
                    
                    // 將 canvas 轉回 Blob (PNG 格式保留品質與透明度)
                    canvas.toBlob((blob) => {
                        URL.revokeObjectURL(url);
                        resolve(blob);
                    }, 'image/png');
                };
                
                img.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('圖片載入失敗'));
                };
                
                img.src = url;
            });
        }
    </script>
</body>
</html>
